name: Release app-plugin + knowledge pack

# Cuts a GitHub Release whenever package.json:version is bumped on main,
# attaching the Claude app plugin ZIP (claude.ai / Claude Desktop / Cowork)
# and the knowledge pack markdown (ChatGPT / Gemini / other assistants).
#
# This reuses the repo's existing version pipeline rather than a parallel
# trigger: per CONTRIBUTING "Version discipline", any change to a skill
# (skills/<name>/SKILL.md or skills/shippo/references/) requires bumping
# package.json:version. That bump is the release signal. The job is gated on
# whether a release for the current version already exists, so it fires exactly
# once per version, a skill change without a version bump produces no release
# (enforcing the discipline), and re-pushes at the same version are no-ops.
on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'package.json'
      - 'providers/claude/plugin/**'
      - 'providers/knowledge-pack/**'
      - 'scripts/build-app-plugin.js'
      - 'scripts/build-knowledge-pack.js'
      - '.github/workflows/release.yml'
  workflow_dispatch:
    inputs:
      force:
        description: "Re-publish the current package.json version even if its release already exists (refreshes assets)"
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  # Build-provenance attestation (auditing): id-token for OIDC signing,
  # attestations for writing the provenance record to the GitHub attestations API.
  id-token: write
  attestations: write

concurrency:
  # One release job at a time; never cancel a run mid-publish.
  group: release-app-plugin
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Resolve version and decide whether to release
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
          FORCE: ${{ github.event.inputs.force }}
        run: |
          VERSION="$(jq -r .version package.json)"
          TAG="v${VERSION}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if gh release view "$TAG" >/dev/null 2>&1; then
            if [ "$FORCE" = "true" ]; then
              echo "Release $TAG exists; --force set, will refresh its assets."
              echo "release=true" >> "$GITHUB_OUTPUT"
            else
              echo "Release $TAG already exists; nothing to do. Bump package.json:version to cut a new release."
              echo "release=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No release for $TAG yet; will create it."
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build app-plugin ZIP
        if: steps.gate.outputs.release == 'true'
        run: |
          npm run build:app-plugin
          echo "Built artifact:"
          ls -la dist/app-plugin/

      - name: Build knowledge pack (banner-stripped for release)
        if: steps.gate.outputs.release == 'true'
        run: |
          npm run build:knowledge-pack
          mkdir -p dist
          # Drop the 2-line AUTO-GENERATED banner (HTML comment + blank line) for a clean download.
          tail -n +3 providers/knowledge-pack/shippo-knowledge-pack.md > dist/shippo-knowledge-pack.md
          echo "Built artifact:"
          ls -la dist/shippo-knowledge-pack.md

      - name: Attest build provenance
        # Auditing: cryptographically binds each published asset to the exact commit
        # + workflow run that produced it (verifiable with `gh attestation verify
        # <asset> --repo goshippo/ai`). Generated before the assets are uploaded so
        # the published artifacts are the attested ones.
        if: steps.gate.outputs.release == 'true'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/app-plugin/shippo-plugin.zip
            dist/shippo-knowledge-pack.md

      - name: Carry forward shippo.dxt from the current latest release
        # This new plugin release becomes the repo's "latest" when published,
        # and docs.goshippo.com deep-links releases/latest/download/shippo.dxt
        # (the Claude Desktop button). Fetch the bridge .dxt from the CURRENT
        # latest (still the previous plugin release at this point) so the new
        # latest carries all three assets; skip cleanly on bootstrap (no dxt
        # anywhere yet). gh release download fails on a missing asset, so a
        # 404 HTML page can never be uploaded as shippo.dxt.
        if: steps.gate.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          if gh release download --pattern shippo.dxt --output dist/shippo.dxt 2>/dev/null; then
            unzip -l dist/shippo.dxt | grep -q 'manifest.json' || { echo "carried shippo.dxt is not a valid archive"; exit 1; }
            echo "will carry shippo.dxt onto the new release"
          else
            echo "no shippo.dxt on the current latest release; skipping carry"
          fi

      - name: Publish GitHub Release
        if: steps.gate.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.gate.outputs.tag }}
        run: |
          set -e
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --target "$GITHUB_SHA" --title "$TAG" \
              --notes "Shippo plugin (shippo-plugin.zip, for the Claude apps: claude.ai / Claude Desktop / Cowork) and knowledge pack (shippo-knowledge-pack.md, a skills-as-context document for ChatGPT / Gemini / other assistants), both built from the canonical skills. Add the plugin via the app's Plugins UI (admins can provision it org-wide via Organization settings → Plugins); add the knowledge pack as a Project file, Custom GPT knowledge, or an attachment."
          fi
          # --clobber so re-runs replace the same-named asset idempotently.
          gh release upload "$TAG" dist/app-plugin/shippo-plugin.zip dist/shippo-knowledge-pack.md --clobber
          if [ -f dist/shippo.dxt ]; then
            gh release upload "$TAG" dist/shippo.dxt --clobber
            echo "Carried shippo.dxt onto release $TAG."
          fi
          echo "Published shippo-plugin.zip and shippo-knowledge-pack.md to release $TAG."
