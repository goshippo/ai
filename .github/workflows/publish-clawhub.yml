name: Publish ClawHub bundle

# Publishes the consolidated ClawHub bundle (providers/clawhub/skills/goshippo)
# to the PUBLIC ClawHub registry at clawhub.ai/shippo/goshippo.
#
# Manual trigger only (workflow_dispatch). This is an outward-facing, effectively
# irreversible action, so it is gated on the full Validate workflow passing first
# (manifests, scans, .mcp.json schema, the agentskills.io / claude-plugin
# validators, the four-way version match, and the ClawHub publish-readiness
# dry-run). The publish job only runs if validate succeeds.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish; must match the bundle SKILL.md frontmatter (e.g. 1.3.1)"
        required: true

permissions:
  contents: read
  # The reusable Validate workflow declares pull-requests: write; a called
  # workflow cannot request more than the caller grants, so grant it here too
  # (Validate's PR-comment steps no-op on workflow_dispatch, but the grant is
  # required for the reusable call to start).
  pull-requests: write

jobs:
  # The "anthropic validate" gate: reuse the exact Validate workflow.
  validate:
    uses: ./.github/workflows/validate.yml
    secrets: inherit

  publish:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Guard, input version must match bundle frontmatter
        run: |
          set -e
          FM=$(grep -E '^version:' providers/clawhub/skills/goshippo/SKILL.md | head -1 | sed -E 's/^version:[[:space:]]*//')
          IN="${{ github.event.inputs.version }}"
          if [ "$FM" != "$IN" ]; then
            echo "::error::input version '$IN' does not match bundle frontmatter version '$FM'. Bump providers/clawhub/skills/goshippo/SKILL.md.template (then npm test) or pass the correct version."
            exit 1
          fi
          echo "Publishing goshippo version $FM"

      - name: Authenticate ClawHub CLI
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          set -e
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "::error::CLAWHUB_TOKEN secret is not set; cannot publish."
            exit 1
          fi
          mkdir -p "$HOME/.config/clawhub" "$HOME/Library/Application Support/clawhub"
          for d in "$HOME/.config/clawhub" "$HOME/Library/Application Support/clawhub"; do
            printf '{"registry":"https://clawhub.ai","token":"%s"}\n' "$CLAWHUB_TOKEN" > "$d/config.json"
          done
          bash scripts/retry.sh 3 npx -y clawhub@0.19.0 whoami

      - name: Publish to ClawHub (shippo/goshippo)
        run: |
          set -e
          npx -y clawhub@0.19.0 skill publish providers/clawhub/skills/goshippo \
            --owner shippo \
            --version "${{ github.event.inputs.version }}" \
            --changelog "Release ${{ github.event.inputs.version }}: hosted OAuth MCP (mcp.shippo.com), 4-tool meta-API with PascalCase operation names." \
            --tags latest
          echo "Published shippo/goshippo@${{ github.event.inputs.version }}."

      - name: Verify published version
        run: |
          set -e
          bash scripts/retry.sh 3 npx -y clawhub@0.19.0 inspect goshippo | head -25
