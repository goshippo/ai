name: Publish @shippo/shippo-mcp
on:
  workflow_dispatch:
  push:
    tags: ['shippo-mcp-v*']
permissions:
  contents: read
jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/modelcontextprotocol
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: npm install
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm publish --ignore-scripts --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_SHIPPO }}
